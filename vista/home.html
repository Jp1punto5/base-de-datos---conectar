<!DOCTYPE html>
<html>
<head>
    <title>Conexión SQL</title>
    <link rel="stylesheet" href="../css/main.css">
    <script src="../JS/login-db.js"></script>
     <script src="../JS/alertas.js"></script>
</head>
<body class="home">

<div class="container">

    <div class="card">
        <h2>Conectar a SQL Server</h2>

        <!-- se agrega un opcional que lista las IPs disponibles, se pueden agregar más -->
        <select name="server" id="server" required>
            <option value="" disabled selected>Seleccione IP a conectar</option>
            <option value="10.24.0.32">SALFA - Base de datos</option>
            <option value="10.24.0.31">Admin y demas - Base de datos</option>
            <option value="10.24.0.33">Otros clientes MIGPS- Base de datos</option>
        </select>
        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">

        <button onclick="conectar()">Conectar</button>

        <p id="estado"></p>
    </div>

    <div class="card">
        <select id="databases" disabled>
            <option>Seleccione base de datos</option>
        </select>

        <button id="btnConectarBD" onclick="conectarBD()" disabled>
            Conectar a BD
        </button>
    </div>

    <div id="tablas" class="card" style="display:none;">
        <h3>Tablas disponibles</h3>

        <button onclick="abrirTabla('MOVILES')">MOVILES</button>
        <button onclick="abrirTabla('MOVILES_EQUIPAMIENTO')">MOVILES_EQUIPAMIENTO</button>
        <br>
        <button onclick="abrirTabla('reportabilidad')">Validar Reportabilidad</button>
        <button onclick="abrirTabla('INTEGRACIONES')">Mantenedor de Integraciones</button>
    </div>

</div>

</body>
</html>
